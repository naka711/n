<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>横スクロールゲーム</title>

<style>
body{
    margin:0;
    background:#87ceeb;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin:10px;
}

#game{
    width:800px;
    height:300px;
    margin:auto;
    background:#87ceeb;
    position:relative;
    overflow:hidden;
    border:3px solid black;
}

#ground{
    position:absolute;
    bottom:0;
    width:2000px;
    height:40px;
    background:#654321;
}

.player{
    width:30px;
    height:30px;
    background:#2563eb;
    position:absolute;
}

.block{
    width:40px;
    height:40px;
    background:#22c55e;
    position:absolute;
}
</style>
</head>

<body>

<h1>横スクロールゲーム</h1>
<p>← → 移動 / スペース ジャンプ</p>

<div id="game">
<div id="ground"></div>
<div id="player" class="player"></div>
</div>

<script>

const player = document.getElementById("player");
const game = document.getElementById("game");

let x = 50;
let y = 0;
let vy = 0;
let onGround = true;
let worldX = 0;

const gravity = 0.8;
const jumpPower = -12;

const blocks = [
{ x:300, y:0 },
{ x:500, y:40 },
{ x:700, y:0 },
{ x:900, y:80 },
{ x:1200, y:0 }
];

blocks.forEach(b=>{
    const block=document.createElement("div");
    block.className="block";
    block.style.left=b.x+"px";
    block.style.bottom=(40+b.y)+"px";
    game.appendChild(block);
});

const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.code==="Space" && onGround){
        vy = jumpPower;
        onGround=false;
    }
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

function update(){

    if(keys["ArrowRight"]){
        worldX -= 5;
    }

    if(keys["ArrowLeft"]){
        worldX += 5;
    }

    vy += gravity;
    y += vy;

    if(y < 0){
        y = 0;
        vy = 0;
        onGround = true;
    }

    player.style.left = x + "px";
    player.style.bottom = (40 + y) + "px";

    document.querySelectorAll(".block").forEach((b,i)=>{
        b.style.left = (blocks[i].x + worldX) + "px";
    });

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
