<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>避けるゲーム</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

h1{
    margin-top:20px;
}

#game{
    width:400px;
    height:500px;
    background:#222;
    margin:20px auto;
    position:relative;
    overflow:hidden;
    border:3px solid #555;
}

#player{
    width:40px;
    height:40px;
    background:#3b82f6;
    position:absolute;
    bottom:10px;
    left:180px;
}

.enemy{
    width:40px;
    height:40px;
    background:#ef4444;
    position:absolute;
}

#score{
    font-size:20px;
}
</style>
</head>

<body>

<h1>避けるゲーム</h1>
<p>← → キーで青い四角を動かして赤いブロックを避けよう！</p>
<div id="score">スコア: 0</div>

<div id="game">
<div id="player"></div>
</div>

<script>

const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreText = document.getElementById("score");

let playerX = 180;
let score = 0;
let enemies = [];

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowLeft"){
        playerX -= 20;
    }

    if(e.key==="ArrowRight"){
        playerX += 20;
    }

    if(playerX < 0) playerX = 0;
    if(playerX > 360) playerX = 360;

    player.style.left = playerX + "px";

});

function createEnemy(){

    const enemy = document.createElement("div");
    enemy.classList.add("enemy");

    const x = Math.floor(Math.random()*10)*40;
    enemy.style.left = x + "px";
    enemy.style.top = "0px";

    game.appendChild(enemy);

    enemies.push({
        element:enemy,
        x:x,
        y:0
    });

}

function update(){

    score++;
    scoreText.textContent = "スコア: " + score;

    if(Math.random() < 0.03){
        createEnemy();
    }

    enemies.forEach((enemy)=>{

        enemy.y += 5;
        enemy.element.style.top = enemy.y + "px";

        if(
            enemy.y + 40 > 450 &&
            enemy.x < playerX + 40 &&
            enemy.x + 40 > playerX
        ){
            alert("ゲームオーバー！ スコア: " + score);
            location.reload();
        }

    });

}

setInterval(update,30);

</script>

</body>
</html>
