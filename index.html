<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>追いかけっこゲーム</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#game{
    width:500px;
    height:500px;
    background:#222;
    margin:20px auto;
    position:relative;
    border:3px solid #555;
}

.player{
    width:30px;
    height:30px;
    background:#3b82f6;
    position:absolute;
}

.enemy{
    width:30px;
    height:30px;
    background:#ef4444;
    position:absolute;
}

#score{
    font-size:20px;
}
</style>
</head>

<body>

<h1>追いかけっこゲーム</h1>
<p>矢印キーで逃げよう！</p>
<div id="score">スコア: 0</div>

<div id="game">
<div id="player" class="player"></div>
<div id="enemy" class="enemy"></div>
</div>

<script>

const player = document.getElementById("player");
const enemy = document.getElementById("enemy");
const scoreText = document.getElementById("score");

let px = 200;
let py = 200;

let ex = 50;
let ey = 50;

let score = 0;

player.style.left = px + "px";
player.style.top = py + "px";

enemy.style.left = ex + "px";
enemy.style.top = ey + "px";

const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

function update(){

    if(keys["ArrowLeft"]) px -= 5;
    if(keys["ArrowRight"]) px += 5;
    if(keys["ArrowUp"]) py -= 5;
    if(keys["ArrowDown"]) py += 5;

    if(px<0) px=0;
    if(px>470) px=470;
    if(py<0) py=0;
    if(py>470) py=470;

    player.style.left = px+"px";
    player.style.top = py+"px";

    // 敵が追いかける
    if(px > ex) ex += 2;
    if(px < ex) ex -= 2;
    if(py > ey) ey += 2;
    if(py < ey) ey -= 2;

    enemy.style.left = ex+"px";
    enemy.style.top = ey+"px";

    // 当たり判定
    if(
        px < ex+30 &&
        px+30 > ex &&
        py < ey+30 &&
        py+30 > ey
    ){
        alert("捕まった！スコア: "+score);
        location.reload();
    }

    score++;
    scoreText.textContent = "スコア: "+score;

}

setInterval(update,30);

</script>

</body>
</html>
